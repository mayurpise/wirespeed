name: CI

# CI disabled on 2026-04-20 pending billing/scope decisions.
# Re-enable by restoring the original `on:` triggers from git history.
on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify CLI runs
        run: node dist/src/index.js --version
